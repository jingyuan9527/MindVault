proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

server {
    listen 80;
    server_name localhost;

    # Knife4j/Swagger/SpringDoc 需要同时通过 /api/ 前缀和裸路径访问
    location /v3/ {
        proxy_pass http://backend:8080;
    }
    location /swagger-ui/ {
        proxy_pass http://backend:8080;
    }
    location = /swagger-ui.html {
        proxy_pass http://backend:8080;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Knife4j 文档首页
    location = /api/doc.html {
        proxy_pass http://backend:8080/doc.html;
    }
    # Swagger UI 重定向
    location = /api/swagger-ui.html {
        proxy_pass http://backend:8080/swagger-ui.html;
    }
    # SpringDoc OpenAPI JSON
    location /api/v3/ {
        proxy_pass http://backend:8080/v3/;
    }
    # Knife4j / Swagger 静态资源
    location /api/webjars/ {
        proxy_pass http://backend:8080/webjars/;
    }
    location /api/swagger-ui/ {
        proxy_pass http://backend:8080/swagger-ui/;
    }
    # 业务 API（保留 /api 前缀）
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_buffering off;
    }
}