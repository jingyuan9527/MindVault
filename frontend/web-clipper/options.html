<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>MindVault Clipper 设置</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      background: #f8f6f3;
      color: #2d2a24;
      padding: 24px;
      max-width: 500px;
    }
    h1 { font-size: 20px; margin-bottom: 16px; color: #c65f39; }
    label { display: block; font-size: 12px; color: #8a857f; margin-bottom: 4px; }
    input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #e8e4de;
      border-radius: 6px;
      font-size: 13px;
      background: #fff;
      color: #2d2a24;
      margin-bottom: 14px;
    }
    .btn {
      padding: 10px 24px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
    }
    .btn-primary { background: #c65f39; color: #fff; }
    .btn-primary:hover { opacity: 0.9; }
    .status { margin-top: 12px; padding: 8px; border-radius: 6px; font-size: 13px; text-align: center; }
    .success { background: #e8f0e6; color: #5d7a5a; }
  </style>
</head>
<body>
  <h1>MindVault Clipper 设置</h1>
  <label>服务器地址</label>
  <input id="serverUrl" placeholder="http://localhost:8080" />
  <label>API Token</label>
  <input id="apiToken" type="password" placeholder="你的 MindVault API Token" />
  <button id="saveBtn" class="btn btn-primary">保存</button>
  <div id="status" class="status" style="display:none"></div>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      chrome.storage.sync.get(['serverUrl', 'apiToken'], (prefs) => {
        if (prefs.serverUrl) document.getElementById('serverUrl').value = prefs.serverUrl
        if (prefs.apiToken) document.getElementById('apiToken').value = prefs.apiToken
      })
      document.getElementById('saveBtn').addEventListener('click', () => {
        const serverUrl = document.getElementById('serverUrl').value.trim()
        const apiToken = document.getElementById('apiToken').value.trim()
        chrome.storage.sync.set({ serverUrl, apiToken }, () => {
          const el = document.getElementById('status')
          el.textContent = '设置已保存'
          el.className = 'status success'
          el.style.display = 'block'
          setTimeout(() => { el.style.display = 'none' }, 2000)
        })
      })
    })
  </script>
</body>
</html>
